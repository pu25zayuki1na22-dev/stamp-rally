<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

#startScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#2196f3;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#startScreen h1{
  font-size:40px;
}

#startScreen button{
  font-size:24px;
  padding:15px 30px;
  border:none;
  border-radius:10px;
}

#game{
  display:none;
}

#game{
  text-align:center;
}

#map{
  display:block;
  margin:20px auto;
}
  

button{
  font-size:20px;
  padding:15px;
  margin:10px;
}

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}

/* 🎉 スタンプ演出 */
#stampPopup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#stampContent{
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  animation: pop 0.5s ease;
}

@keyframes pop{
  0%{ transform:scale(0.5); opacity:0; }
  100%{ transform:scale(1); opacity:1; }
}


</style>


<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<!-- スタート画面 -->
<div id="startScreen">
  <h1>観光スタンプラリー</h1>
  <p>近づくだけでスタンプGET！</p>
  <button onclick="startGame()">スタート</button>
</div>


<!-- ゲーム画面 -->
<div id="game">
  <h2>観光スタンプラリー</h2>
  <button onclick="getLocation()">現在地チェック</button>
  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>
  <div id="map"></div>
  <div id="info" class="card">
  <h3 id="infoName">スポット名</h3>
  <p id="infoPoint"></p>
  <p id="infoDesc">ここに説明が表示されます</p>
</div>

<!-- スタンプ演出 -->
<div id="stampPopup">
  <div id="stampContent">
    <h2 id="stampTitle">スタンプGET！</h2>
    <p id="stampName"></p>
    <p id="stampPoint"></p>
  </div>
</div>

<script>

let stampCount = 0
let marker
let map

// 距離計算
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000
  const dLat = (lat2 - lat1) * Math.PI / 180
  const dLng = (lng2 - lng1) * Math.PI / 180

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2) *
    Math.sin(dLng/2)

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
  return R * c
}

// スタート
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  map = L.map('map').setView([41.7687,140.7288],13)

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map)

  setSpots()
}

// アイコン
const normalIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

const clearIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

// スポット
const spots = [

{name:"市立函館高校",lat:41.79450604936817,lng:140.76358217606838,point:50,got:false,desc:"函館市唯一の市立高校"},
{name:"🏠️",lat:41.79115280657907,lng:140.7408893622458,point:50,got:false,desc:"テストプレイ"},

{name:"函館公園",lat:41.75642425057021,lng:140.71603982603986,point:20,got:false,desc:"昼は動物施設、夜は幻想的な桜が楽しめる"},
{name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,got:false,desc:"旧日本銀行で、民族に関する展示が多い"},

{name:"熱帯植物園",lat:41.7775,lng:140.7828,point:30,got:false,desc:"植物だけでなく猿も楽しめる植物園"},
{name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,got:false,desc:"白い壁に緑色の屋根が映える歴史ある教会"},
{name:"二十間坂",lat:41.7638,lng:140.7155,point:30,got:false,desc:"八幡坂にも負けない！広くて美しい坂道"},

{name:"こどものくに",lat:41.7567318201806,lng:140.71660449566673,point:30,got:false,desc:"日本で一番古い観覧車がある遊園地エリア"},
{name:"旧丸井今井",lat:41.7639442153979,lng:140.71761135461858,point:30,got:false,desc:"歴史ある建物、北で一番古いエレベターがある"},
{name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,got:false,desc:"和洋折衷な昔の洋品店"},

{name:"旧公会堂",lat:41.7652779492643,lng:140.70981456015946,point:30,got:false,desc:"外観から溢れ出るレトロさがある有名な洋館"},
{name:"市立函館博物館",lat:41.756114551305316,lng:140.7151896588969,point:30,got:false,desc:"様々なジャンルの歴史資料が展示されている"}

]


// マーカー
function setSpots(){
  spots.forEach(spot=>{
    spot.marker = L.marker([spot.lat,spot.lng],{icon:normalIcon})
      .addTo(map)
      .bindPopup(spot.name)
  })
}

// 現在地取得
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      checkPosition,
      (error)=>{
        document.getElementById("result").textContent =
          "位置情報エラー：" + error.message
      },
      {
        enableHighAccuracy: true
      }
    )
  }
}

// スタンプ演出
function showStamp(spot){
  document.getElementById("stampName").textContent = spot.name;
  document.getElementById("stampPoint").textContent = "+" + spot.point + "ポイント！";

  document.getElementById("stampPopup").style.display = "flex";

  if(navigator.vibrate){
    navigator.vibrate(200);
  }

  setTimeout(()=>{
    document.getElementById("stampPopup").style.display = "none";
  },2000);
}

// 判定
function checkPosition(position){

  const userLat = position.coords.latitude
  const userLng = position.coords.longitude

  if(marker){
    map.removeLayer(marker)
  }

  marker = L.marker([userLat,userLng]).addTo(map)
  map.setView([userLat,userLng],15)

  let found = false

  spots.forEach(spot=>{
    const d = getDistance(userLat,userLng,spot.lat,spot.lng)

    if(d < 200){
      if(!spot.got){
        spot.got = true
        stampCount += spot.point

        spot.marker.setIcon(clearIcon)

        document.getElementById("score").textContent =
          "現在のポイント: "+stampCount

        showStamp(spot)
        document.getElementById("infoName").textContent = spot.name;
        document.getElementById("infoPoint").textContent = "+" + spot.point + "pt";
        document.getElementById("infoDesc").textContent = spot.desc;

      }else{
        document.getElementById("result").textContent =
          spot.name+" は取得済み"
      }

      found = true
    }
  })

  if(!found){
    document.getElementById("result").textContent =
      "まだ観光地にいません（200m以内に入ってね）"
  }
}


</script>

</body>
</html>
