<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリーゲーム</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

h1{
  color:#00796b;
}

button{
  font-size:20px;
  padding:15px;
  background:#00796b;
  color:white;
  border:none;
  border-radius:10px;
}

#result{
  font-size:18px;
  margin:10px;
  padding:10px;
  background:white;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#score{
  color:#d84315;
}

#map{
  height:400px;
  margin:10px;
  border-radius:15px;
}

#startScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<!-- タイトル画面 -->
<div id="startScreen">
  <h1>観光スタンプラリーゲーム</h1>
  <button onclick="startGame()">スタート</button>
</div>

<h2>観光スタンプラリー</h2>
<button onclick="getLocation()">現在地をチェック</button>

<h2 id="score">現在のポイント: 0</h2>
<p id="result"></p>

<div id="map"></div>

<!-- 効果音 -->
<audio id="getSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>

let stampCount = 0
let marker

function startGame(){
 document.getElementById("startScreen").style.display="none"
}

// 地図
const map = L.map('map').setView([41.7687,140.7288],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map)

// アイコン
const greenIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const redIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const yellowIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const blueIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

// 観光地
const spots=[
{ name:"五稜郭",lat:41.7967,lng:140.7569,level:"busy",point:10,desc:"春には桜、冬にはライトアップ。星型城郭で今でも歴史が残っています",got:false },
{ name:"函館山",lat:41.7592,lng:140.7043,level:"normal",point:20,desc:"百万ドルの夜景で有名な函館の夜景。暗闇の中に函館の町並みが輝きます",got:false },
{ name:"金森赤レンガ倉庫",lat:41.7654,lng:140.7188,level:"empty",point:30,desc:"ロマンチックな風情があり、クリスマスには大きなツリーが！お土産の購入におすすめです！",got:false }
]

// ピン
spots.forEach(spot=>{
 let icon = spot.level==="busy"?redIcon:spot.level==="normal"?yellowIcon:blueIcon

 let message = "<b>"+spot.name+"</b><br>"+spot.desc
 if(spot.level==="empty"){
  message = "⭐おすすめスポット！<br>"+message
 }

 spot.marker = L.marker([spot.lat,spot.lng],{icon:icon})
  .addTo(map)
  .bindPopup(message)
})

// 距離
function getDistance(lat1, lng1, lat2, lng2) {
 const R = 6371000;
 const dLat = (lat2 - lat1) * Math.PI / 180;
 const dLng = (lng2 - lng1) * Math.PI / 180;
 const a =
  Math.sin(dLat / 2) * Math.sin(dLat / 2) +
  Math.cos(lat1 * Math.PI / 180) *
  Math.cos(lat2 * Math.PI / 180) *
  Math.sin(dLng / 2) *
  Math.sin(dLng / 2);
 const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
 return R * c;
}

// 方向
function getDirection(lat1,lng1,lat2,lng2){
 const dLat=lat2-lat1
 const dLng=lng2-lng1
 if(Math.abs(dLat)>Math.abs(dLng)){
  return dLat>0?"北":"南"
 }else{
  return dLng>0?"東":"西"
 }
}

// 位置取得
function getLocation(){
 navigator.geolocation.getCurrentPosition(checkPosition)
}

// 判定
function checkPosition(position){

 const userLat=position.coords.latitude
 const userLng=position.coords.longitude

 if(marker){ map.removeLayer(marker) }

 marker=L.marker([userLat,userLng]).addTo(map)
 map.setView([userLat,userLng],15)

 let nearest=null
 let min=Infinity
 let found=false

 spots.forEach(spot=>{
  const d=getDistance(userLat,userLng,spot.lat,spot.lng)

  if(d<min){ min=d; nearest=spot }

  if(d<100){
   if(!spot.got){
    spot.got=true
    stampCount+=spot.point
    spot.marker.setIcon(greenIcon)

    document.getElementById("getSound").play()

    document.getElementById("score").textContent="現在のポイント: "+stampCount

    // ランク表示
    let rank="C"
    if(stampCount>=60) rank="S"
    else if(stampCount>=40) rank="A"
    else if(stampCount>=20) rank="B"

    document.getElementById("result").innerHTML=
      spot.name+" GET！<br>ランク："+rank

   }
   found=true
  }
 })

 if(!found && nearest){
  const dir=getDirection(userLat,userLng,nearest.lat,nearest.lng)

  let msg="一番近い観光地<br>"
  if(nearest.level==="empty"){ msg+="⭐おすすめ！<br>" }

  msg+=nearest.name+"<br>"+Math.round(min)+"m（"+dir+"）"

  document.getElementById("result").innerHTML=msg
 }

}

</script>

</body>
</html>
