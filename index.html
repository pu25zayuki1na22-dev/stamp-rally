<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

h2{ color:#333; }

button{
  background:#2196f3;
  color:white;
  border:none;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  font-size:20px;
  padding:15px;
  margin:10px;
}

#score{ color:#ff9800; }

#collection{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

#collection img{
  width:60px;
  margin:5px;
  border-radius:10px;
}

#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:#2196f3;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#game{ display:none; }

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}

/* スタンプ */
#stampPopup{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#stampContent{
  background:white;
  padding:30px;
  border-radius:15px;
  animation: pop 0.5s;
}

@keyframes pop{
  0%{ transform:scale(0.5); opacity:0; }
  100%{ transform:scale(1); opacity:1; }
}

/* キラキラ */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  background:gold;
  border-radius:50%;
  animation: sparkleAnim 1s forwards;
}

@keyframes sparkleAnim{
  0%{ opacity:1; }
  100%{ transform:translateY(-100px); opacity:0; }
}

/* ⭐ クリア表示（ここだけ追加） */
#clearArea{
  display:none;
  margin-top:30px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="startScreen">
  <h1>観光スタンプラリー</h1>
  <button onclick="startGame()">スタート</button>
</div>

<div id="game">
  <button onclick="getLocation()">現在地チェック</button>
  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>
  <div id="map"></div>

  <h3>スタンプコレクション</h3>
  <div id="collection"></div>

  <h3 id="infoName"></h3>
  <p id="infoPoint"></p>
  <p id="infoDesc"></p>

  <!-- ⭐ クリア表示 -->
  <div id="clearArea">
    <h1>クリア！🎉</h1>
    <p>全部のスタンプを集めた！すごい！</p>
    <img src="https://i.imgur.com/Eb9djZR.png" style="width:90%; max-width:400px;">
    <br>
    <button onclick="resetGame()">もう一度遊ぶ</button>
  </div>

</div>

<div id="stampPopup">
  <div id="stampContent"></div>
</div>

<script>

let stampCount = 0
let marker
let map
let circle

let normalAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3")
let rareAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3")
let clearAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")

// 距離
function getDistance(a,b,c,d){
  const R=6371000
  const dLat=(c-a)*Math.PI/180
  const dLng=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// スタート
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  setTimeout(()=>{
    map = L.map('map').setView([41.7687,140.7288],13)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
    setSpots()
  },100)
}

// スポット（そのまま）
const spots = [ /* ←ここはそのまま（省略OK） */ ]

function setSpots(){
  spots.forEach(s=>{
    s.marker = L.marker([s.lat, s.lng]).addTo(map)
  })
}

// 位置取得
function getLocation(){
  normalAudio.play().catch(()=>{})
  navigator.geolocation.getCurrentPosition(checkPosition)
}

// キラキラ
function sparkle(){
  for(let i=0;i<20;i++){
    const s=document.createElement("div")
    s.className="sparkle"
    s.style.left=Math.random()*window.innerWidth+"px"
    s.style.top=Math.random()*window.innerHeight+"px"
    document.body.appendChild(s)
    setTimeout(()=>s.remove(),1000)
  }
}

// 判定
function checkPosition(pos){
  const lat = pos.coords.latitude
  const lng = pos.coords.longitude

  if(marker) map.removeLayer(marker)
  marker = L.marker([lat,lng]).addTo(map)

  let found=false

  spots.forEach(s=>{
    if(getDistance(lat,lng,s.lat,s.lng)<10000){

      if(!s.got){
        s.got=true
        stampCount+=s.point

        const img=document.createElement("img")
        img.src=s.stamp
        collection.appendChild(img)

        score.textContent="現在のポイント: "+stampCount
      }

      found=true
    }
  })

  // ⭐ ここだけ追加（クリア処理）
  if(spots.every(s=>s.got)){
    document.getElementById("clearArea").style.display="block"
    clearAudio.currentTime = 0
    clearAudio.play().catch(()=>{})
    sparkle()
  }

  if(!found){
    result.textContent="まだ近くにスポットがないよ"
  }
}

// リセット
function resetGame(){
  location.reload()
}

</script>

</body>
</html>
