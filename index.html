
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

#startScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#2196f3;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#startScreen h1{
  font-size:40px;
}

#startScreen button{
  font-size:24px;
  padding:15px 30px;
  border:none;
  border-radius:10px;
}

#game{
  display:none;
}

button{
  font-size:20px;
  padding:15px;
  margin:10px;
}

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<!-- スタート画面 -->
<div id="startScreen">
  <h1>観光スタンプラリー</h1>
  <p>近づくだけでスタンプGET！</p>
  <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="game">
  <h2>観光スタンプラリー</h2>
  <button onclick="getLocation()">現在地チェック</button>
  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>
  <div id="map"></div>
</div>

<script>

let stampCount = 0
let marker
let map

// 距離計算（正確版）
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000
  const dLat = (lat2 - lat1) * Math.PI / 180
  const dLng = (lng2 - lng1) * Math.PI / 180

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2) *
    Math.sin(dLng/2)

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
  return R * c
}

// スタート
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  map = L.map('map').setView([41.7687,140.7288],13)

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map)

  setSpots()
}

// アイコン
const normalIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

const clearIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

// スポット
const spots = [
{ name:"五稜郭",lat:41.7967,lng:140.7569,point:10,got:false },
{ name:"函館山",lat:41.7592,lng:140.7043,point:10,got:false },
{ name:"金森赤レンガ倉庫",lat:41.7654,lng:140.7188,point:10,got:false },
{ name:"八幡坂",lat:41.7645,lng:140.7138,point:20,got:false },
{ name:"函館公園",lat:41.7705,lng:140.7205,point:20,got:false },
{ name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,got:false },
{ name:"熱帯植物園",lat:41.7722,lng:140.7712,point:30,got:false },
{ name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,got:false },
{ name:"二十間坂",lat:41.7638,lng:140.7155,point:30,got:false },
{ name:"こどものくに",lat:41.7728,lng:140.7220,point:30,got:false },
{ name:"旧丸井今井",lat:41.7640,lng:140.7290,point:30,got:false },
{ name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,got:false },
{ name:"旧相馬家住宅",lat:41.7628,lng:140.7159,point:30,got:false },
{ name:"市立函館博物館",lat:41.7700,lng:140.7200,point:30,got:false }
]

// マーカー
function setSpots(){
  spots.forEach(spot=>{
    spot.marker = L.marker([spot.lat,spot.lng],{icon:normalIcon})
      .addTo(map)
      .bindPopup(spot.name)
  })
}

// 現在地
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(checkPosition)
  }
}

// 判定
function checkPosition(position){

  const userLat = position.coords.latitude
  const userLng = position.coords.longitude

  if(marker){
    map.removeLayer(marker)
  }

  marker = L.marker([userLat,userLng]).addTo(map)
  map.setView([userLat,userLng],15)

  let found = false

  spots.forEach(spot=>{

    const d = getDistance(userLat,userLng,spot.lat,spot.lng)

    // ⭐ 200m以内でGET（ゆるい設定）
    if(d < 200){

      if(!spot.got){
        spot.got = true
        stampCount += spot.point

        spot.marker.setIcon(clearIcon)

        document.getElementById("score").textContent =
          "現在のポイント: "+stampCount

        document.getElementById("result").textContent =
          "🎉 "+spot.name+" スタンプGET！"
      }else{
        document.getElementById("result").textContent =
          spot.name+" は取得済み"
      }

      found = true
    }

  })

  if(!found){
    document.getElementById("result").textContent =
      "まだ観光地にいません（200m以内に入ってね）"
  }

}

</script>

</body>
</html>
