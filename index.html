<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

/* スタート画面 */
#startScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#2196f3;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#startScreen h1{
  font-size:40px;
  margin-bottom:20px;
}

#startScreen button{
  font-size:24px;
  padding:15px 30px;
  border:none;
  border-radius:10px;
  background:white;
  color:#2196f3;
}

/* ゲーム画面 */
#game{
  display:none;
}

button{
  font-size:20px;
  padding:15px;
  margin:10px;
}

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<!-- スタート画面 -->
<div id="startScreen">
  <h1>観光スタンプラリー</h1>
  <p>函館を巡ってスタンプを集めよう！</p>
  <button onclick="startGame()">スタート</button>
</div>

<!-- ゲーム画面 -->
<div id="game">
  <h2>観光スタンプラリー</h2>
  <p>観光地に近づいてスタンプを集めよう！⭐は高得点！</p>

  <button onclick="getLocation()">現在地をチェック</button>

  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>

  <div id="map"></div>
</div>

<script>

let stampCount = 0
let marker
let map

// スタートボタン
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  // 地図をここで初期化（←これ重要！）
  map = L.map('map').setView([41.7687,140.7288],13)

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map)

  setSpots()
}

// アイコン
const normalIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

const rareIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

const clearIcon = L.icon({
  iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize:[25,41],
  iconAnchor:[12,41]
})

// スポット
const spots = [
{ name:"五稜郭",lat:41.7967,lng:140.7569,point:10,desc:"星形の城",got:false,rare:false },
{ name:"函館山",lat:41.7592,lng:140.7043,point:10,desc:"夜景が有名",got:false,rare:false },
{ name:"金森赤レンガ倉庫",lat:41.7654,lng:140.7188,point:10,desc:"ショッピング",got:false,rare:false },

{ name:"八幡坂",lat:41.7645,lng:140.7138,point:20,desc:"絶景の坂",got:false,rare:true },
{ name:"函館公園",lat:41.7705,lng:140.7205,point:20,desc:"自然豊か",got:false,rare:true },
{ name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,desc:"文化体験",got:false,rare:true },

{ name:"熱帯植物園",lat:41.7722,lng:140.7712,point:30,desc:"サル温泉",got:false,rare:true },
{ name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,desc:"歴史建築",got:false,rare:true },
{ name:"二十間坂",lat:41.7638,lng:140.7155,point:30,desc:"広い坂",got:false,rare:true },

{ name:"こどものくに",lat:41.7728,lng:140.7220,point:30,desc:"遊園地",got:false,rare:true },
{ name:"旧丸井今井",lat:41.7640,lng:140.7290,point:30,desc:"歴史建物",got:false,rare:true },
{ name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,desc:"昔の商店",got:false,rare:true },

{ name:"旧相馬家住宅",lat:41.7628,lng:140.7159,point:30,desc:"豪商の家",got:false,rare:true },
{ name:"市立函館博物館",lat:41.7700,lng:140.7200,point:30,desc:"資料館",got:false,rare:true }
]

// マーカー設置
function setSpots(){
  spots.forEach(spot=>{
    let icon = spot.rare ? rareIcon : normalIcon

    let text = "<b>"+spot.name+"</b><br>"+spot.desc
    if(spot.rare){
      text = "⭐おすすめ！<br>"+text
    }

    spot.marker = L.marker([spot.lat,spot.lng],{icon:icon})
      .addTo(map)
      .bindPopup(text)
  })
}

// 現在地
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(checkPosition)
  }
}

// 判定
function checkPosition(position){

  const userLat = position.coords.latitude
  const userLng = position.coords.longitude

  if(marker){
    map.removeLayer(marker)
  }

  marker = L.marker([userLat,userLng]).addTo(map)
  map.setView([userLat,userLng],15)

  let found = false

  spots.forEach(spot=>{

    const d = Math.sqrt(
      Math.pow(userLat - spot.lat,2) +
      Math.pow(userLng - spot.lng,2)
    )

    if(d < 0.01){

      if(!spot.got){
        spot.got = true
        stampCount += spot.point

        spot.marker.setIcon(clearIcon)

        document.getElementById("score").textContent =
          "現在のポイント: "+stampCount

        document.getElementById("result").textContent =
          "🎉 "+spot.name+" スタンプGET！"
      }

      found = true
    }
  })

  if(!found){
    document.getElementById("result").textContent =
      "まだ観光地にいません"
  }
}

</script>

</body>
</html>
