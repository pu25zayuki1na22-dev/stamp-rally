let gotStamp = false;
let stampCount = 0;
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>
<style>
body {
  text-align: center;
  font-family: sans-serif;
}
button {
  font-size: 20px;
  padding: 15px;
}
</style>
  
 <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
 
</head>
<body>

<h2>観光スタンプラリー</h2>
<p>観光地に近づいてボタンを押そう！</p>
<button onclick="getLocation()">現在地をチェック</button>
<h2 id="score">現在のポイント: 0</h2>
<p id="result"></p>
  
<div id="map" style="height: 400px;"></div>
  
<script>
  
  const map = L.map('map').setView([41.7687, 140.7288], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let marker;
  const greenIcon = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});
  
  const redIcon = L.icon({
  iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
  shadowUrl: 'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
  iconSize: [25, 41],
  iconAnchor: [12, 41]
});


let stampCount = 0;
  
const spots = [
  { name: "五稜郭", lat: 41.7967, lng: 140.7569, got: false, point: 1 },
  { name: "函館山", lat: 41.7592, lng: 140.7043, got: false, point: 1 },
  { name: "金森赤レンガ倉庫", lat: 41.7654, lng: 140.7188, got: false, point: 2 }
];
  
  spots.forEach(spot => {
   spot.marker=L.marker([spot.lat, spot.lng], { icon: redIcon })
    .addTo(map)
    .bindPopup(spot.name);
});

function getLocation() {
  if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(function(position) {
  checkPosition(position);
});
   
  } else {
    document.getElementById("result").textContent = "位置情報が使えません";
  }
}

function checkPosition(position) {
  const userLat = position.coords.latitude;
  const userLng = position.coords.longitude;
  if (marker) {
  map.removeLayer(marker);
}

marker = L.marker([userLat, userLng]).addTo(map);
map.setView([userLat, userLng], 15);


  let found = false;

  spots.forEach(spot => {
    const distance =
      Math.sqrt(
        Math.pow(userLat - spot.lat, 2) +
        Math.pow(userLng - spot.lng, 2)
      );

    if (distance < 0.01) {
      if (!spot.got) {
        spot.got = true;
        stampCount += spot.point;

        spot.marker.setIcon(greenIcon);
      
        spot.marker.bindPopup(
"🎉 " + spot.name + "<br>スタンプGET！ 👏"
).openPopup();

        document.getElementById("result").textContent =
"🎉 " + spot.name + "に到着！スタンプゲット！ 👏";

        document.getElementById("score").textContent =
  "現在のポイント: " + stampCount;

        if (stampCount === 4) {
  document.getElementById("result").textContent =
    "🎉 全スポット制覇！コンプリートおめでとう！ 🎉";
} else {
  document.getElementById("result").textContent =
    spot.name + " のスタンプゲット！ 現在のスタンプ数: " + stampCount;
}

      } else {
        document.getElementById("result").textContent =
          spot.name + " はすでに取得済み！";
      }
      found = true;
    }
  });

  if (!found) {
    document.getElementById("result").textContent =
      "まだ観光地にいません！";
  }
}

</script>

</body>
</html>
