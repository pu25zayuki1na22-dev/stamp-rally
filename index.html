<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

button{
  background:#2196f3;
  color:white;
  border:none;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  font-size:20px;
  padding:15px;
  margin:10px;
}

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}

#collection{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

#collection img{
  width:60px;
  margin:5px;
  border-radius:10px;
}

/* スタンプ */
#stampPopup{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#stampContent{
  background:white;
  padding:30px;
  border-radius:15px;
}

/* クリア */
#clearScreen{
  display:none;
  margin-top:30px;
  text-align:center;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="game">
  <button onclick="getLocation()">現在地チェック</button>
  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>
  <div id="map"></div>

  <h3>スタンプコレクション</h3>
  <div id="collection"></div>

  <h3 id="infoName"></h3>
  <p id="infoPoint"></p>
  <p id="infoDesc"></p>

  <button onclick="resetGame()">もう一度遊ぶ</button>

  <!-- 🎉 クリア表示 -->
  <div id="clearScreen">
    <h1>クリア！🎉</h1>
    <p>全部のスタンプを集めた！すごい！</p>
    <img src="https://i.imgur.com/Eb9djZR.png" style="width:90%; max-width:400px;">
  </div>
</div>

<div id="stampPopup">
  <div id="stampContent"></div>
</div>

<script>

let stampCount = 0
let marker
let map
let circle

let normalAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3")
let rareAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3")
let clearAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")

// 距離
function getDistance(a,b,c,d){
  const R=6371000
  const dLat=(c-a)*Math.PI/180
  const dLng=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// 地図開始
map = L.map('map').setView([41.7687,140.7288],13)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

// スポット（そのまま）
const spots = [
{name:"市立函館高校",lat:41.79450604936817,lng:140.76358217606838,point:50,got:false,desc:"函館市唯一の市立高校",stamp:"https://i.imgur.com/WyAkpLk.png",rare:true},
{name:"🏠️",lat:41.79115280657907,lng:140.7408893622458,point:50,got:false,desc:"テストプレイ",stamp:"https://i.imgur.com/tYH6nnT.png"},
{name:"函館公園",lat:41.75642425057021,lng:140.71603982603986,point:20,got:false,desc:"昼は動物施設、夜は幻想的な桜が楽しめる",stamp:"https://i.imgur.com/IhuAT5v.png"},
{name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,got:false,desc:"旧日本銀行で、民族に関する展示が多い",stamp:"https://i.imgur.com/2RU7q5Z.png",rare:true},
{name:"熱帯植物園",lat:41.7775,lng:140.7828,point:30,got:false,desc:"植物だけでなく猿も楽しめる植物園",stamp:"https://i.imgur.com/FjKvtco.png",rare:true},
{name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,got:false,desc:"白い壁に緑色の屋根が映える歴史ある教会",stamp:"https://i.imgur.com/YZOryaq.png"},
{name:"二十間坂",lat:41.7638,lng:140.7155,point:30,got:false,desc:"八幡坂にも負けない！広くて美しい坂道",stamp:"https://i.imgur.com/jEOk82t.png"},
{name:"こどものくに",lat:41.7567318201806,lng:140.71660449566673,point:30,got:false,desc:"日本で一番古い観覧車がある遊園地エリア",stamp:"https://i.imgur.com/aOGiitq.png"},
{name:"旧丸井今井",lat:41.7639442153979,lng:140.71761135461858,point:30,got:false,desc:"歴史ある建物、北で一番古いエレベターがある",stamp:"https://i.imgur.com/4UDAbWs.png"},
{name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,got:false,desc:"和洋折衷な昔の洋品店",stamp:"https://i.imgur.com/uiChVp1.png",rare:true},
{name:"旧公会堂",lat:41.7652779492643,lng:140.70981456015946,point:30,got:false,desc:"外観から溢れ出るレトロさがある有名な洋館",stamp:"https://i.imgur.com/uWEywJW.png"},
{name:"市立函館博物館",lat:41.756114551305316,lng:140.7151896588969,point:30,got:false,desc:"様々なジャンルの歴史資料が展示されている",stamp:"https://i.imgur.com/rkKPTD9.png"}
]

// ピン設置
spots.forEach(s=>{
  s.marker = L.marker([s.lat, s.lng]).addTo(map)
  s.marker.on('click', ()=>{
    infoName.textContent = s.name
    infoPoint.textContent = "+" + s.point + "pt"
    infoDesc.textContent = s.desc
  })
})

// 位置取得
function getLocation(){
  navigator.geolocation.getCurrentPosition(checkPosition)
}

// 判定
function checkPosition(pos){
  const lat = pos.coords.latitude
  const lng = pos.coords.longitude

  if(marker) map.removeLayer(marker)
  marker = L.marker([lat,lng]).addTo(map)
  map.setView([lat,lng],15)

  let found = false

  spots.forEach(s=>{
    if(getDistance(lat,lng,s.lat,s.lng)<10000){
      if(!s.got){
        s.got=true
        stampCount+=s.point

        s.marker.setIcon(L.icon({
          iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
          iconSize:[32,32]
        }))

        const img=document.createElement("img")
        img.src=s.stamp
        collection.appendChild(img)

        score.textContent="現在のポイント: "+stampCount
      }
      found=true
    }
  })

  if(spots.every(s=>s.got)){
    clearScreen.style.display="block"
    clearAudio.play().catch(()=>{})
  }

  if(!found){
    result.textContent="まだ近くにスポットがないよ"
  }
}

// リセット
function resetGame(){
  stampCount=0
  score.textContent="現在のポイント: 0"
  collection.innerHTML=""

  spots.forEach(s=>{
    s.got=false
    s.marker.setIcon(new L.Icon.Default())
  })

  clearScreen.style.display="none"
}

</script>

</body>

<style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>
<body>

<div id="startScreen">

  <p>📍 位置情報をONにしてください</p>

<div id="game" style="display:none;">

<div id="map"></div>

<h3 id="infoName"></h3>
<p id="infoPoint"></p>
<p id="infoDesc"></p>

<!-- クリア表示 -->
<div id="clearScreen">
  <h1>クリア！🎉</h1>
  <p>全部のスタンプを集めた！すごい！</p>
  <img src="https://i.imgur.com/Eb9djZR.png" style="width:90%; max-width:400px;">
</div>

<!-- クリア後だけ出る -->
<button id="resetBtn" onclick="resetGame()" style="display:none;">
  もう一度遊ぶ
</button>

</div>

<script>

let stampCount = 0
let marker
let map
let circle

let normalAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3")
let clearAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3")

normalAudio.preload = "auto"
clearAudio.preload = "auto"

// スポット（そのまま）
const spots = [
{name:"市立函館高校",lat:41.79450604936817,lng:140.76358217606838,point:50,got:false,desc:"函館市唯一の市立高校",stamp:"https://i.imgur.com/WyAkpLk.png"},
{name:"🏠️",lat:41.79115280657907,lng:140.7408893622458,point:50,got:false,desc:"テストプレイ",stamp:"https://i.imgur.com/tYH6nnT.png"},
{name:"函館公園",lat:41.75642425057021,lng:140.71603982603986,point:20,got:false,desc:"昼は動物施設、夜は幻想的な桜が楽しめる",stamp:"https://i.imgur.com/IhuAT5v.png"},
{name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,got:false,desc:"旧日本銀行で、民族に関する展示が多い",stamp:"https://i.imgur.com/2RU7q5Z.png"},
{name:"熱帯植物園",lat:41.7775,lng:140.7828,point:30,got:false,desc:"植物だけでなく猿も楽しめる植物園",stamp:"https://i.imgur.com/FjKvtco.png"},
{name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,got:false,desc:"白い壁に緑色の屋根が映える歴史ある教会",stamp:"https://i.imgur.com/YZOryaq.png"},
{name:"二十間坂",lat:41.7638,lng:140.7155,point:30,got:false,desc:"八幡坂にも負けない！広くて美しい坂道",stamp:"https://i.imgur.com/jEOk82t.png"},
{name:"こどものくに",lat:41.7567318201806,lng:140.71660449566673,point:30,got:false,desc:"日本で一番古い観覧車がある遊園地エリア",stamp:"https://i.imgur.com/aOGiitq.png"},
{name:"旧丸井今井",lat:41.7639442153979,lng:140.71761135461858,point:30,got:false,desc:"歴史ある建物、北で一番古いエレベターがある",stamp:"https://i.imgur.com/4UDAbWs.png"},
{name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,got:false,desc:"和洋折衷な昔の洋品店",stamp:"https://i.imgur.com/uiChVp1.png"},
{name:"旧公会堂",lat:41.7652779492643,lng:140.70981456015946,point:30,got:false,desc:"レトロな洋館",stamp:"https://i.imgur.com/uWEywJW.png"},
{name:"市立函館博物館",lat:41.756114551305316,lng:140.7151896588969,point:30,got:false,desc:"歴史資料が展示されている",stamp:"https://i.imgur.com/rkKPTD9.png"}
]

// スタート
function startGame(){
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  setTimeout(()=>{
    map = L.map('map').setView([41.7687,140.7288],13)

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map)

    // ピン設置
    spots.forEach(s=>{
      s.marker = L.marker([s.lat, s.lng]).addTo(map)
    })

  },100)
}

// 距離
function getDistance(a,b,c,d){
  const R=6371000
  const dLat=(c-a)*Math.PI/180
  const dLng=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// 位置取得
function getLocation(){
  normalAudio.currentTime = 0
  normalAudio.play().catch(()=>{})

  navigator.geolocation.getCurrentPosition(checkPosition)
}

// 判定
function checkPosition(pos){
  const lat = pos.coords.latitude
  const lng = pos.coords.longitude

  if(marker) map.removeLayer(marker)
  marker = L.marker([lat,lng]).addTo(map)
  map.setView([lat,lng],15)

  let found = false

  spots.forEach(s=>{
    if(getDistance(lat,lng,s.lat,s.lng)<10000){
      if(!s.got){
        s.got=true
        stampCount+=s.point

        s.marker.setIcon(L.icon({
          iconUrl:"https://maps.google.com/mapfiles/ms/icons/red-dot.png",
          iconSize:[32,32]
        }))

        const img=document.createElement("img")
        img.src=s.stamp
        document.getElementById("collection").appendChild(img)

        document.getElementById("score").textContent="現在のポイント: "+stampCount
      }
      found=true
    }
  })

  // クリア判定
  if(spots.every(s=>s.got)){
    document.getElementById("clearScreen").style.display="block"
    document.getElementById("resetBtn").style.display="inline-block"

    clearAudio.currentTime = 0
    clearAudio.play().catch(()=>{})
  }

  if(!found){
    document.getElementById("result").textContent="まだ近くにスポットがないよ"
  }
}

// リセット
function resetGame(){
  stampCount=0
  document.getElementById("score").textContent="現在のポイント: 0"
  document.getElementById("collection").innerHTML=""

  spots.forEach(s=>{
    s.got=false
    s.marker.setIcon(new L.Icon.Default())
  })

  document.getElementById("clearScreen").style.display="none"
  document.getElementById("resetBtn").style.display="none"
}

</script>
