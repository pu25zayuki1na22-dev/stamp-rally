<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

h2{ color:#333; }

button{
  background:#2196f3;
  color:white;
  border:none;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  font-size:20px;
  padding:15px;
  margin:10px;
}

button:active{ transform:scale(0.95); }

#score{ color:#ff9800; }

#collection{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

#collection img{
  width:60px;
  margin:5px;
  border-radius:10px;
}

#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:#2196f3;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#game{ display:none; }

#map{
  height:400px;
  width:90%;
  margin:20px auto;
  border-radius:10px;
}

/* スタンプ */
#stampPopup{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#stampContent{
  background:white;
  padding:30px;
  border-radius:15px;
  animation: pop 0.5s;
}

@keyframes pop{
  0%{ transform:scale(0.5); opacity:0; }
  100%{ transform:scale(1); opacity:1; }
}

/* キラキラ */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  background:gold;
  border-radius:50%;
  animation: sparkleAnim 1s forwards;
}

@keyframes sparkleAnim{
  0%{ opacity:1; }
  100%{ transform:translateY(-100px); opacity:0; }
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>
  
<div id="startScreen">
  <h1>観光スタンプラリー</h1>

  <p>📍 位置情報をONにしてください</p>
  <p>🚶‍♂️ 実際に歩いて近づくとスタンプがもらえます</p>
  <p>⚠️ 歩きスマホは危険！安全に楽しもう</p>

  <button onclick="startGame()">スタート</button>
</div>


<div id="game">
  <button onclick="getLocation()">現在地チェック</button>
  <h2 id="score">現在のポイント: 0</h2>
  <p id="result"></p>
  <div id="map"></div>

  <h3>スタンプコレクション</h3>
  <div id="collection"></div>

  <h3 id="infoName"></h3>
  <p id="infoPoint"></p>
  <p id="infoDesc"></p>
</div>

<div id="stampPopup">
  <div id="stampContent"></div>
</div>

<script>

let stampCount = 0
let marker
let map
let completed = false

let circle  

let normalAudio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3")
let rareAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3")

normalAudio.preload = "auto"
rareAudio.preload = "auto"

// 距離
function getDistance(a,b,c,d){
  const R=6371000
  const dLat=(c-a)*Math.PI/180
  const dLng=(d-b)*Math.PI/180
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLng/2)**2
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
}

// スタート

  function startGame(){

  // ① 画面切り替え（すぐ反応）
  document.getElementById("startScreen").style.display="none"
  document.getElementById("game").style.display="block"

  // ② 少し遅れて地図作る（重要！）
  setTimeout(()=>{
    map = L.map('map').setView([41.7687,140.7288],13)

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map)

    setSpots()
  }, 100)
}

// スポット
const spots = [

{name:"市立函館高校",lat:41.79450604936817,lng:140.76358217606838,point:50,got:false,desc:"函館市唯一の市立高校",stamp:"https://drive.google.com/uc?id=1xc5ycVMnf_02G69LJFBu6al_qxthvS27",rare:true},

{name:"🏠️",lat:41.79115280657907,lng:140.7408893622458,point:50,got:false,desc:"テストプレイ",stamp:"https://drive.google.com/uc?id=1OALdy7FaqEjrfhiK6CwdIR7YJWsoMOYA"},

{name:"函館公園",lat:41.75642425057021,lng:140.71603982603986,point:20,got:false,desc:"昼は動物施設、夜は幻想的な桜が楽しめる",stamp:"https://drive.google.com/uc?id=1jV8s4uK7OhY0aFPte1O2qCfgLBAKg2Ip"},

{name:"北方民族資料館",lat:41.7652,lng:140.7180,point:20,got:false,desc:"旧日本銀行で、民族に関する展示が多い",stamp:"https://drive.google.com/uc?id=1spNW4SX5ytR5UcUR6t3-cdruJv4ne_3m",rare:true},

{name:"熱帯植物園",lat:41.7775,lng:140.7828,point:30,got:false,desc:"植物だけでなく猿も楽しめる植物園",stamp:"https://drive.google.com/uc?id=1eDbIkOcCjJseKlXhZ_3s3y6KypckyACe",rare:true},

{name:"ハリストス正教会",lat:41.7622,lng:140.7148,point:30,got:false,desc:"白い壁に緑色の屋根が映える歴史ある教会",stamp:"https://drive.google.com/uc?id=1NMHTNoELZkwF2YAH1mAm2ZKjBSwo23kO"},

{name:"二十間坂",lat:41.7638,lng:140.7155,point:30,got:false,desc:"八幡坂にも負けない！広くて美しい坂道",stamp:"https://drive.google.com/uc?id=1n5CgLhZwOKexkT0voqanyQ7I1_lUeu9Y"},

{name:"こどものくに",lat:41.7567318201806,lng:140.71660449566673,point:30,got:false,desc:"日本で一番古い観覧車がある遊園地エリア",stamp:"https://drive.google.com/uc?id=1gD3DYW_dbyf5sA1tDhckNy9s8qiVBIbM"},

{name:"旧丸井今井",lat:41.7639442153979,lng:140.71761135461858,point:30,got:false,desc:"歴史ある建物、北で一番古いエレベターがある",stamp:"https://drive.google.com/uc?id=1DOX4TkrImSN2XE4kJkq_EkMf7-lSfXRh"},

{name:"旧金森洋物店",lat:41.7656,lng:140.7192,point:30,got:false,desc:"和洋折衷な昔の洋品店",stamp:"https://drive.google.com/uc?id=1EFoGztj0nS8nzB7ZKXrpTIIL0jp-44an",rare:true},

{name:"旧公会堂",lat:41.7652779492643,lng:140.70981456015946,point:30,got:false,desc:"外観から溢れ出るレトロさがある有名な洋館",stamp:"https://drive.google.com/uc?id=1pUtXSHUOfqp94FhmMpW3mes8c9H4E4pk"},

{name:"市立函館博物館",lat:41.756114551305316,lng:140.7151896588969,point:30,got:false,desc:"様々なジャンルの歴史資料が展示されている",stamp:"https://drive.google.com/uc?id=1a1lLldnsaUF_nclJc7q5ei0txvTiRXtZ"}

]


function setSpots(){
  spots.forEach(s=>{
    s.marker=L.marker([s.lat,s.lng]).addTo(map)
  })
}

// 位置取得
function getLocation(){

  // 🔊 音許可
  normalAudio.play().catch(()=>{})

  navigator.geolocation.getCurrentPosition(checkPosition)
}

// キラキラ
function sparkle(){
  for(let i=0;i<20;i++){
    const s=document.createElement("div")
    s.className="sparkle"
    s.style.left=Math.random()*window.innerWidth+"px"
    s.style.top=Math.random()*window.innerHeight+"px"
    document.body.appendChild(s)
    setTimeout(()=>s.remove(),1000)
  }
}

// スタンプ表示
function showStamp(s){

  const box = document.getElementById("stampContent")
  box.innerHTML = ""

  const title = document.createElement("h2")
  title.textContent = s.rare ? "🌟レアスタンプGET！" : "スタンプGET！"

  const text = document.createElement("p")
  text.textContent = s.name + " +" + s.point + "pt"

  const img = document.createElement("img")
  img.src = s.stamp
  img.style.width = "80px"
  img.style.marginTop = "10px"

  box.appendChild(title)
  box.appendChild(text)
  box.appendChild(img)

  document.getElementById("stampPopup").style.display = "flex"

  if(s.rare){
    rareAudio.currentTime = 0
    rareAudio.play()
    sparkle()
  }else{
    normalAudio.currentTime = 0
    normalAudio.play()
  }

  setTimeout(()=>{
    document.getElementById("stampPopup").style.display = "none"
  },2000)
}




    rareAudio.currentTime=0
    rareAudio.play()
    sparkle()
  }else{
    normalAudio.currentTime=0
    normalAudio.play()
  }

  setTimeout(()=>{
    document.getElementById("stampPopup").style.display="none"
  },2000)
}

// 判定
function checkPosition(pos){
  const lat=pos.coords.latitude
  const lng=pos.coords.longitude

  if(marker) map.removeLayer(marker)
  marker=L.marker([lat,lng]).addTo(map)
  map.setView([lat,lng],15)

  // 🔵 半径円
if(circle){
  map.removeLayer(circle)
}

circle = L.circle([lat, lng], {
  radius: 200,
  color: 'blue',
  fillColor: '#2196f3',
  fillOpacity: 0.2
}).addTo(map)


  let found=false

  spots.forEach(s=>{
    if(getDistance(lat,lng,s.lat,s.lng)<200){
      if(!s.got){
        s.got=true
        stampCount+=s.point

        const img=document.createElement("img")
        img.src = s.stamp || "https://cdn-icons-png.flaticon.com/512/190/190411.png"
        document.getElementById("collection").appendChild(img)

        document.getElementById("score").textContent="現在のポイント: "+stampCount

        showStamp(s)

        document.getElementById("infoName").textContent=s.name
        document.getElementById("infoPoint").textContent="+"+s.point+"pt"
        document.getElementById("infoDesc").textContent=s.desc
      }
      found=true
    }
  })

  if(!found){
    document.getElementById("result").textContent="まだ近くにスポットがないよ"
  }
}

</script>
</body>
</html>
