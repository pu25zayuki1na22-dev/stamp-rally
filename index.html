<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>観光スタンプラリー</title>

<style>
body{
  text-align:center;
  font-family:sans-serif;
  background: linear-gradient(to bottom, #e0f7fa, #ffffff);
}

h2{
  color:#00796b;
}

button{
  font-size:20px;
  padding:15px;
  background:#00796b;
  color:white;
  border:none;
  border-radius:10px;
}

#result{
  font-size:18px;
  margin:10px;
  padding:10px;
  background:white;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#score{
  color:#d84315;
}

#map{
  height:400px;
  margin:10px;
  border-radius:15px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<h2>観光スタンプラリー</h2>
<p>観光地に近づいてボタンを押そう！</p>

<button onclick="getLocation()">現在地をチェック</button>

<h2 id="score">現在のポイント: 0</h2>
<p id="result"></p>

<div id="map"></div>

<script>

let stampCount = 0
let marker

const map = L.map('map').setView([41.7687,140.7288],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map)

// アイコン
const greenIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const redIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const yellowIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const blueIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

// 観光地
const spots=[
{ name:"五稜郭",lat:41.7967,lng:140.7569,level:"busy",point:10,desc:"ここに紹介文",got:false },
{ name:"函館山",lat:41.7592,lng:140.7043,level:"normal",point:20,desc:"ここに紹介文",got:false },
{ name:"金森赤レンガ倉庫",lat:41.7654,lng:140.7188,level:"empty",point:30,desc:"ここに紹介文",got:false }
]

// ピン表示
spots.forEach(spot=>{

 let icon

 if(spot.level==="busy"){
  icon=redIcon
 }else if(spot.level==="normal"){
  icon=yellowIcon
 }else{
  icon=blueIcon
 }

 let message = "<b>"+spot.name+"</b><br>"+spot.desc

 if(spot.level==="empty"){
  message = "⭐おすすめスポット！<br>" + message
 }

 spot.marker = L.marker([spot.lat,spot.lng],{icon:icon})
  .addTo(map)
  .bindPopup(message)

})

// 距離計算
function getDistance(lat1, lng1, lat2, lng2) {
 const R = 6371000;
 const dLat = (lat2 - lat1) * Math.PI / 180;
 const dLng = (lng2 - lng1) * Math.PI / 180;

 const a =
  Math.sin(dLat / 2) * Math.sin(dLat / 2) +
  Math.cos(lat1 * Math.PI / 180) *
  Math.cos(lat2 * Math.PI / 180) *
  Math.sin(dLng / 2) *
  Math.sin(dLng / 2);

 const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
 return R * c;
}

// 方向計算
function getDirection(lat1, lng1, lat2, lng2){

 const dLat = lat2 - lat1
 const dLng = lng2 - lng1

 if(Math.abs(dLat) > Math.abs(dLng)){
  return dLat > 0 ? "北" : "南"
 }else{
  return dLng > 0 ? "東" : "西"
 }

}

// 位置取得
function getLocation(){
 if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(checkPosition)
 }else{
  document.getElementById("result").textContent="位置情報が使えません"
 }
}

// 判定＋ナビ
function checkPosition(position){

 const userLat=position.coords.latitude
 const userLng=position.coords.longitude

 if(marker){
  map.removeLayer(marker)
 }

 marker=L.marker([userLat,userLng]).addTo(map)
 map.setView([userLat,userLng],15)

 let found=false
 let nearestSpot = null
 let minDistance = Infinity

 spots.forEach(spot=>{

  const distance = getDistance(userLat, userLng, spot.lat, spot.lng)

  // 一番近いスポット
  if(distance < minDistance){
   minDistance = distance
   nearestSpot = spot
  }

  // スタンプ判定
  if(distance < 100){

   if(!spot.got){

    spot.got=true
    stampCount += spot.point

    spot.marker.setIcon(greenIcon)

    document.getElementById("score").textContent=
     "現在のポイント: "+stampCount

    document.getElementById("result").textContent=
     spot.name+" のスタンプGET！ +" + spot.point + "ポイント"

   }else{
    document.getElementById("result").textContent=
     spot.name+" は取得済みです"
   }

   found=true
  }

 })

 // ナビ表示
 if(!found && nearestSpot){

  let message = "一番近い観光地は<br>"

  if(nearestSpot.level==="empty"){
   message += "⭐おすすめ！<br>"
  }

  const direction = getDirection(userLat, userLng, nearestSpot.lat, nearestSpot.lng)

  message += nearestSpot.name + "<br>あと " + Math.round(minDistance) + "m（" + direction + "）"

  document.getElementById("result").innerHTML = message
 }

}

</script>

</body>
</html>
