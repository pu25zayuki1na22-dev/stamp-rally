<script>

let stampCount = 0
let marker

const map = L.map('map').setView([41.7687,140.7288],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map)

const greenIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const redIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const yellowIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const blueIcon = L.icon({
 iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
 shadowUrl:'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',
 iconSize:[25,41],
 iconAnchor:[12,41]
})

const spots=[

{ name:"五稜郭",lat:41.7967,lng:140.7569,level:"busy",point:10,desc:"ここに紹介文",got:false },

{ name:"函館山",lat:41.7592,lng:140.7043,level:"normal",point:20,desc:"ここに紹介文",got:false },

{ name:"金森赤レンガ倉庫",lat:41.7654,lng:140.7188,level:"empty",point:30,desc:"ここに紹介文",got:false }

]

spots.forEach(spot=>{

 let icon

 if(spot.level==="busy"){
  icon=redIcon
 }else if(spot.level==="normal"){
  icon=yellowIcon
 }else{
  icon=blueIcon
 }

 let message = "<b>"+spot.name+"</b><br>"+spot.desc

 if(spot.level==="empty"){
  message = "⭐おすすめスポット！<br>" + message
 }

 spot.marker = L.marker([spot.lat,spot.lng],{icon:icon})
  .addTo(map)
  .bindPopup(message)

})

function getLocation(){
 if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(checkPosition)
 }else{
  document.getElementById("result").textContent="位置情報が使えません"
 }
}

function getDistance(lat1, lng1, lat2, lng2) {
 const R = 6371000;
 const dLat = (lat2 - lat1) * Math.PI / 180;
 const dLng = (lng2 - lng1) * Math.PI / 180;

 const a =
  Math.sin(dLat / 2) * Math.sin(dLat / 2) +
  Math.cos(lat1 * Math.PI / 180) *
  Math.cos(lat2 * Math.PI / 180) *
  Math.sin(dLng / 2) *
  Math.sin(dLng / 2);

 const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
 return R * c;
}

function checkPosition(position){

 const userLat=position.coords.latitude
 const userLng=position.coords.longitude

 if(marker){
  map.removeLayer(marker)
 }

 marker=L.marker([userLat,userLng]).addTo(map)
 map.setView([userLat,userLng],15)

 let found=false

 spots.forEach(spot=>{

  const distance = getDistance(userLat, userLng, spot.lat, spot.lng)

  if(distance < 100){

   if(!spot.got){

    spot.got=true
    stampCount += spot.point

    // 全制覇
    const allGot = spots.every(s => s.got)
    if(allGot){
     document.getElementById("result").textContent =
      "🎉 全スポット制覇！観光マスター！ 👑"
    }

    // おすすめ制覇
    const emptySpots = spots.filter(s => s.level === "empty")
    const emptyGot = emptySpots.every(s => s.got)

    if(emptyGot){
     stampCount += 50
     document.getElementById("result").textContent =
      "⭐おすすめスポット制覇！ +50ポイント！"
    }

    spot.marker.setIcon(greenIcon)

    document.getElementById("score").textContent=
     "現在のポイント: "+stampCount

    document.getElementById("result").textContent=
     spot.name+" のスタンプGET！ +" + spot.point + "ポイント"

   }else{
    document.getElementById("result").textContent=
     spot.name+" は取得済みです"
   }

   found=true
  }

 })

 if(!found){
  document.getElementById("result").textContent=
   "まだ観光地にいません"
 }

}

</script>
